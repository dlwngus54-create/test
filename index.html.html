<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul Weather Vibe</title>
    <style>
        /* 디자인: 비주얼 바이브 */
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Apple SD Gothic Neo', sans-serif;
            background: #2c3e50; /* 기본 배경 */
            transition: background 1s ease;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            width: 350px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        h1 { font-size: 4rem; margin: 10px 0; font-weight: bold; }
        .city { font-size: 1.2rem; opacity: 0.8; letter-spacing: 2px; }
        .desc { font-size: 1.5rem; margin-bottom: 20px; }
        .player-wrapper {
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="city">SEOUL</div>
        <h1 id="temp">--°C</h1>
        <div class="desc" id="desc">날씨 분석 중...</div>
        
        <div class="player-wrapper" id="music-player">
            </div>
    </div>

    <script>
        const API_KEY = '87f353069b2605f25a987d6023774883'; 
        const city = 'Seoul';

        async function getWeather() {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=kr`);
                const data = await response.json();
                
                const temp = Math.round(data.main.temp);
                const condition = data.weather[0].main;
                const description = data.weather[0].description;

                updateUI(temp, condition, description);
            } catch (error) {
                document.getElementById('desc').innerText = "날씨 로드 실패";
            }
        }

        function updateUI(temp, condition, desc) {
            document.getElementById('temp').innerText = temp + "°C";
            document.getElementById('desc').innerText = desc;

            let videoId = "";
            let bgColor = "";

            // 날씨별 음악 및 배경색 매칭 로직 (바이브 코딩)
            if (condition === 'Clear') {
                videoId = "0S_v_q5pY8E"; // 시티팝
                bgColor = "linear-gradient(135deg, #ff9a9e, #fad0c4)";
            } else if (condition === 'Rain' || condition === 'Drizzle') {
                videoId = "n_vG0YmO6Yc"; // 재즈
                bgColor = "linear-gradient(135deg, #203a43, #2c5364)";
            } else if (condition === 'Clouds') {
                videoId = "X_D08f9fG_0"; // 로파이
                bgColor = "linear-gradient(135deg, #bdc3c7, #2c3e50)";
            } else {
                videoId = "g_F30H07x8g"; // 어쿠스틱
                bgColor = "linear-gradient(135deg, #616161, #9bc5c3)";
            }

            document.body.style.background = bgColor;
            document.getElementById('music-player').innerHTML = `
                <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
            `;
        }

        getWeather();
    </script>
</body>
</html>
