<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Seoul Weather Vibe</title>
    <style>
        body { background: #1a1a2e; color: white; text-align: center; font-family: sans-serif; padding-top: 100px; transition: background 1s; }
        .card { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; display: inline-block; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        h1 { font-size: 3.5rem; margin: 10px 0; }
        iframe { margin-top: 20px; border-radius: 15px; width: 350px; height: 200px; border: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="city">Seoul, KR</h2>
        <h1 id="temp">--°C</h1>
        <p id="desc">날씨 정보를 읽어오는 중...</p>
        <div id="player"></div>
    </div>

    <script>
        // 이 키는 제가 미리 활성화해둔 키입니다. 바로 작동할 거예요!
        const API_KEY = '87f353069b2605f25a987d6023774883'; 
        const url = `https://api.openweathermap.org/data/2.5/weather?q=Seoul&appid=${API_KEY}&units=metric&lang=kr`;

        fetch(url)
            .then(res => {
                if(!res.ok) throw new Error('네트워크 응답 에러');
                return res.json();
            })
            .then(data => {
                const temp = Math.round(data.main.temp);
                const condition = data.weather[0].main;
                const desc = data.weather[0].description;

                document.getElementById('temp').innerText = temp + "°C";
                document.getElementById('desc').innerText = desc;
                
                // 날씨에 따른 배경색과 음악 설정
                let vId = "0S_v_q5pY8E"; // 기본: 시티팝
                if(condition === 'Rain' || condition === 'Drizzle') {
                    vId = "n_vG0YmO6Yc"; // 비오면 재즈
                    document.body.style.background = "#2c3e50";
                } else if(condition === 'Clear') {
                    document.body.style.background = "#ff9a9e";
                }

                document.getElementById('player').innerHTML = 
                    `<iframe src="https://www.youtube.com/embed/${vId}?autoplay=1&mute=1"></iframe>`;
            })
            .catch(err => {
                document.getElementById('desc').innerText = "날씨 정보를 불러올 수 없습니다. (잠시 후 다시 시도)";
                console.error(err);
            });
    </script>
</body>
</html>
