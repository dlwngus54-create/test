<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Seoul Weather Vibe</title>
    <style>
        body { background: linear-gradient(135deg, #ff9a9e, #fad0c4); color: white; text-align: center; font-family: sans-serif; padding-top: 100px; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; display: inline-block; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        h1 { font-size: 3.5rem; margin: 10px 0; }
        iframe { margin-top: 20px; border-radius: 15px; width: 350px; height: 200px; border: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="city">Seoul, KR</h2>
        <h1 id="temp">24°C</h1> <p id="desc">오늘의 추천 음악</p>
        <div id="player">
            <iframe src="https://www.youtube.com/embed/0S_v_q5pY8E?autoplay=1&mute=1"></iframe>
        </div>
    </div>

    <script>
        const API_KEY = '87f353069b2605f25a987d6023774883'; 
        const url = `https://api.openweathermap.org/data/2.5/weather?q=Seoul&appid=${API_KEY}&units=metric&lang=kr`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                // API 성공 시 실제 데이터로 교체
                const temp = Math.round(data.main.temp);
                document.getElementById('temp').innerText = temp + "°C";
                document.getElementById('desc').innerText = data.weather[0].description;
                
                let vId = data.weather[0].main === 'Rain' ? "n_vG0YmO6Yc" : "0S_v_q5pY8E";
                document.getElementById('player').innerHTML = `<iframe src="https://www.youtube.com/embed/${vId}?autoplay=1&mute=1"></iframe>`;
            })
            .catch(() => {
                // API 실패(401)해도 아무것도 안 함 (이미 기본값이 화면에 떠 있음)
                console.log("날씨 서버 대기 중... 기본 모드로 표시합니다.");
            });
    </script>
</body>
</html>
